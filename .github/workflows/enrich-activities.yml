name: Enriquecimiento IA de Actividades (Groq)

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Límite de actividades (para testing)'
        required: false
        default: ''

jobs:
  enrich-activities:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ia.txt') }}
    - run: pip install -r requirements-ia.txt
    - run: mkdir -p data
    - name: Ejecutar enriquecimiento
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        FIREBASE_apiKey: ${{ secrets.FIREBASE_APIKEY }}
        FIREBASE_authDomain: ${{ secrets.FIREBASE_AUTHDOMAIN }}
        FIREBASE_projectId: ${{ secrets.FIREBASE_PROJECTID }}
        FIREBASE_storageBucket: ${{ secrets.FIREBASE_STORAGEBUCKET }}
        FIREBASE_messagingSenderId: ${{ secrets.FIREBASE_MESSAGINGSENDERID }}
        FIREBASE_appId: ${{ secrets.FIREBASE_APPID }}
      run: python scripts/enrich_activities.py --upload
